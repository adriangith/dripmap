name: Data Enrichment

on:
  # Run daily at 6:00 AM AEST (20:00 UTC previous day)
  schedule:
    - cron: '0 20 * * *'

  # Run when enrichment pipeline code changes
  push:
    branches: [main]
    paths:
      - 'scripts/fetch-enrichments.ts'
      - 'scripts/fetch-events.ts'
      - 'src/lib/integrations/providers/**'
      - 'src/lib/integrations/enrichment-types.ts'
      - 'src/lib/integrations/types.ts'
  pull_request:
    branches: [main]
    paths:
      - 'scripts/fetch-enrichments.ts'
      - 'scripts/fetch-events.ts'
      - 'src/lib/integrations/providers/**'
      - 'src/lib/integrations/enrichment-types.ts'
      - 'src/lib/integrations/types.ts'

  workflow_dispatch: # Allow manual trigger

permissions:
  contents: read

concurrency:
  group: enrich-${{ github.ref }}
  cancel-in-progress: true

jobs:
  enrich:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
      NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }}
      NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MEASUREMENT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - name: Build location data
        run: npm run build:schema && npm run validate && npm run build:data

      - name: Fetch enrichments and events
        run: npm run enrich
