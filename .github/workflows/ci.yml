name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Lint is currently excluded — main has pre-existing errors.
      # Re-enable once those are resolved.
      # - run: npm run lint

      - run: npm test

      - run: npm run build
