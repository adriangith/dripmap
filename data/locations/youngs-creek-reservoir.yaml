directions: >
  From Orbost, head north following local roads towards Young's Creek Reservoir. Park at the picnic area and hike approximately 2 km to reach the reservoir.
tips:
  - The 2 km hike in is part of the adventure
  - Pick a spot free of fallen timber for your swim
  - Seldom visited — expect solitude
  - Bring all supplies as there are no facilities at the reservoir
