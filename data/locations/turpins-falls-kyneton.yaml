directions: >
  From Kyneton, head north-east following signs to Turpins Falls. Access is via a walking track from the car park area. The falls are in a gorge — expect a steep descent.
tips:
  - The pool is larger than an Olympic swimming pool
  - High rock walls on three sides create a dramatic amphitheatre
  - Historic swimming club operated here in the 1930s
  - Steep descent to the falls — wear sturdy footwear
