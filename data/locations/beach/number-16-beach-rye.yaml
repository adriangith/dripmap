directions: Drive to Rye on the Mornington Peninsula. Number Sixteen Beach is signposted along the Nepean Highway with its
  own car park. Walk down the track to the beach. About 95km south of Melbourne via the Mornington Peninsula Freeway.
tips:
- Time your visit for low tide to explore the rock pools and sea caves
- Walk south along the rock shelf to find the Dragon's Head formation
- Wear reef shoes — the rocks are very slippery when wet
- Not a swimming beach — the ocean-side surf is strong and unpredictable
- The "waterfall" effect over the rock shelf is most dramatic at mid-tide
- Bring a camera — the geology here is extraordinary
