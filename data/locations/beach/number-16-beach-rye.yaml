description: A rugged "back beach" near Rye on the Mornington Peninsula, known for its intricate rock shelf and dramatic
  "waterfalls" created by waves crashing over the reef platform. At low tide, a series of sea caves and deep rock pools are
  revealed along the shoreline, making it a paradise for exploration. The nearby Dragon's Head rock formation is a famous
  landmark with its distinctive shape and the way water flows through and around it. Much quieter and wilder than the calm
  bay-side beaches, Number Sixteen offers a raw, untouched coastal experience with some of the peninsula's most dramatic
  geological formations.
