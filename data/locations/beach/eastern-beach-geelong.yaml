directions: Located on the Geelong waterfront along Eastern Beach Road, about 75km southwest of Melbourne. Easily accessible
  via the Princes Freeway. Follow signs to the Geelong waterfront and Eastern Beach. Ample parking along the foreshore.
tips:
- The enclosed pool is free to swim in all year round
- The diving tower is open in summer — check council notices for availability
- The vintage carousel operates on weekends and school holidays
- Combine with a walk along the Geelong waterfront bollard trail
- Plenty of cafes and restaurants along the waterfront nearby
- The children's pool is separate and very shallow — perfect for toddlers
