description: A beautifully restored 1930s seaside precinct on the Geelong waterfront featuring a massive enclosed seawater pool.
  A long wooden promenade encircles the swimming area, complete with shark-proof netting that creates a safe, calm bathing
  environment. The pool includes a multi-level diving tower and floating platforms in the centre. The surrounding Art Deco
  reserve features manicured lawns, a separate children's pool, a vintage carousel, and sweeping views across Corio Bay. It
  is one of the finest examples of inter-war seaside architecture in Australia.
