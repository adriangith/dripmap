description: A dramatic ocean beach on the Bass Strait side of the Mornington Peninsula, within the Mornington Peninsula National
  Park. Portsea Back Beach features rugged rock formations, powerful surf, and stunning coastal scenery. London Bridge, a
  natural rock archway, is a short walk along the cliff path. The beach is popular with surfers and rock-pool explorers, but
  strong currents require caution.
