directions: Drive to Blairgowrie on the Mornington Peninsula. Park along the back beach road and look for the staircase access
  down the cliffs. The track is steep — wear sturdy footwear. About 100km south of Melbourne via the Mornington Peninsula
  Freeway.
tips:
- Check tide times before visiting — the rock pools are only accessible at low tide
- The cliff staircase is steep and can be slippery — not suitable for mobility-impaired visitors
- Wear reef shoes for exploring the rock pools
- No facilities at all — bring water, sunscreen, and everything you need
- Much quieter than nearby Sorrento and Rye beaches
- Combine with a visit to nearby Sorrento or Rye for food
