description: A hidden gem on the back beaches of the Mornington Peninsula, celebrated for its deep, circular rock pools that
  appear like natural bathtubs at low tide. The bay is surrounded by a dramatic natural amphitheatre of towering sandstone
  cliffs that shelter the beach from the wind. Some pools are large and deep enough to fully submerge in, offering a protected
  swimming experience away from the ocean swell. A steep staircase leads down the cliff face, providing panoramic views of
  the rugged coastline as you descend. The beach is much quieter than the bay-side beaches, offering a raw and untouched
  coastal experience.
