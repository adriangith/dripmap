description: Natural rock pools along the rugged Bass Strait coastline at Sorrento, on the tip of the Mornington Peninsula.
  At low tide, these pools become calm, sheltered swimming spots perfect for families with young children, while the surrounding
  rock platforms offer excellent snorkelling opportunities. The pools are surrounded by dramatic coastal limestone formations.
