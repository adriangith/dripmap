description: A crescent-shaped bay in Black Rock offering a rare chance to swim near the HMVS Cerberus, a 19th-century warship
  that was deliberately sunk in 1926 to serve as a breakwater. The rusted hull of the Cerberus provides a dramatic centrepiece
  to the sheltered bay, making it one of Melbourne's most photographed beaches. The calm, shallow waters are popular with families
  and snorkellers, who explore the marine life around the wreck and the nearby jetty. The bay is well-sheltered by the Cerberus
  and the surrounding cliffs, making it calm even on windy days.
