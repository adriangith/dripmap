directions: Drive to Black Rock via Beach Road or the Nepean Highway. Half Moon Bay has a car park accessible from Beach Road.
  The beach is a short walk down the cliff path from the car park, or accessible via the boat ramp. About 20km southeast of
  Melbourne CBD.
tips:
- The Cerberus wreck is slowly deteriorating — admire from a distance, do not climb on it
- Excellent snorkelling around the wreck and jetty pylons
- The cliff-top walking path offers spectacular views of the bay
- Combine with a walk along the Bay Trail to Red Bluff or Sandringham
- Local cafes and restaurants in the Black Rock village nearby
- One of Melbourne's most accessible and photogenic beaches
