directions: Drive to Tidal River in Wilsons Promontory National Park (about 230km southeast of Melbourne). From the Tidal
  River day-visitor car park, follow the signposted walking track to Squeaky Beach (approximately 30 minutes each way through
  coastal scrub).
tips:
- Park entry fees apply for Wilsons Promontory National Park
- The 30-minute walk is mostly flat with some sandy sections
- Explore the granite boulder maze at the northern end of the beach
- Wear reef shoes if exploring the rocks — they can be slippery when wet
- Combine with Tidal River beach and the Lilly Pilly Gully nature walk
- No mobile reception in most of the park — download maps beforehand
