description: One of Victoria's most iconic beaches within Wilsons Promontory National Park, famous for its high-silica white
  sand that produces a distinct squeaking sound when walked upon. The turquoise waters are framed by large granite boulders
  stained orange by lichen, creating an extraordinary contrast of colour. At the northern end, a maze of smooth granite rock
  formations invites exploration. The clear, shallow bay is ideal for swimming, and the beach is reached via a pleasant 30-minute
  walk through coastal bushland from the Tidal River campground.
