description: >
  A rare cliff on Lake Hume at Bonegilla provides clean entry into deep water for experienced swimmers, from a lawn on
  top of the point with panoramic views up both the Mitta Mitta arm and the Murray arm of the lake. The cliff face
  provides access to the water when the lake is drawn down.
