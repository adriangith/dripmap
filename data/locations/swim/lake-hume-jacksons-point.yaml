description: Jackson's Point is a popular swimming and recreation area on the shores of Lake Hume, one of Australia's largest
  inland reservoirs. The lake was created by the Hume Dam across the Murray River, completed in 1936 after 17 years of construction.
  With a maximum depth of 40 metres and surface area of over 20,000 hectares when full, it offers vast open-water swimming,
  boating, and fishing.
