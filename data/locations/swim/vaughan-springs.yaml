description: A peaceful mineral springs reserve along the Loddon River near the historic gold-mining village of Vaughan, in
  central Victoria's goldfields region. The natural mineral springs bubble up from underground, and the river provides a refreshing
  swimming spot in warmer months. The surrounding bushland is rich with gold-rush era history and remnants of the 1850s mining
  settlement.
