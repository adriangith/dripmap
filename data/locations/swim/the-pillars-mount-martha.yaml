description: A unique Mediterranean-style cliff-jumping spot on the Mornington Peninsula that has become a hugely popular summer
  destination for thrill-seekers. Various sandstone ledges at different heights allow jumpers to choose their level of daring,
  launching into the deep, clear green-blue water below. There are no sandy beach areas here — only flat rock platforms perfect
  for sunbathing between jumps. Accessed via a small track from the Esplanade, the golden sandstone pillars and vivid water
  create a striking, almost European atmosphere.
