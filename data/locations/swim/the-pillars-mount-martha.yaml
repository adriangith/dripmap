directions: Drive to Mount Martha on the Mornington Peninsula. Park along the Esplanade near the Balcombe Point area. Look
  for the small track leading down the cliff face to the rock platforms below. The access is steep and informal — sturdy footwear
  is recommended for the climb down.
tips:
- Always check the water depth before jumping — conditions change with tides
- There are no facilities, lifeguards, or sandy areas — bring everything you need
- The access track is steep and can be slippery — wear proper shoes
- Very popular on hot days — arrive early for a good rock platform spot
- Not suitable for young children due to cliff edges and lack of beach
- About 65km south of Melbourne CBD
