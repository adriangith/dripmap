description: An artificial lake in the heart of Daylesford spa country, designed by Walter Burley Griffin (the architect of
  Canberra) and completed in 1929. The calm, clear waters are surrounded by walking trails and mineral springs. Historic change
  rooms from the 1940s sit lakeside, and the charming cafes and galleries of Daylesford are just a short stroll away.
