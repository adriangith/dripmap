description: >
  A fascinating part of Melbourne's gold mining history, the Pound Bend Tunnel outlet is a popular spot for swimming in
  the Yarra River. Visitors can swim in the shallow rock pool or dangle their feet from the rock ledge that juts out
  into the stream.
