tips:
- Bring a bottle to collect mineral water from the various springs
- Each spring has a subtly different mineral taste
- The Hepburn Bathhouse & Spa is a short walk away for a full spa experience
- Walk the Mineral Springs Walk to visit multiple springs
- Combine with Lake Daylesford, just a few minutes' drive away
