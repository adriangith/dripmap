description: A unique natural mineral spring in the Hepburn Mineral Springs Reserve, where carbonated water bubbles up dramatically
  through a small opening in the rock — creating a natural 'blowhole' effect. The surrounding reserve has multiple mineral
  springs to taste, walking trails through native bushland, and the historic Hepburn Bathhouse & Spa nearby for a full spa
  country experience.
