description: A beautiful waterfall in the Anakie Gorge area of the Brisbane Ranges National Park, about an hour west of Melbourne.
  The falls cascade into a fern-lined grotto, creating a magical swimming spot surrounded by dense bushland. The walk to the
  falls passes through open eucalyptus forest rich with native birdlife including koalas and cockatoos.
