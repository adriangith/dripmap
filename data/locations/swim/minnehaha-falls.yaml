tips:
- Best after rain when the falls are flowing well
- The walk in is moderate — around 30 minutes each way
- Keep an eye out for koalas in the eucalyptus trees
- The pool below the falls is small and can be cold
- Part of Brisbane Ranges National Park — no entry fees
