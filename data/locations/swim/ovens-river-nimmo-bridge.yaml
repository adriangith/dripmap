region: Victoria, Australia
country: AU
description: >
  A dramatic swimming spot near Myrtleford where a long, diagonal chute of water cuts through a layer of jagged bedrock
  before gushing out into a deep hole in the Ovens River. The river then opens into a wide, more tranquil pool for
  swimming, a legacy of a past mining mishap.
