description: A striking blue-green lake in Plenty Gorge Park, just 25km north of Melbourne's CBD. The vivid colour comes from
  minerals in the soil of this former quarry. The surrounding parkland is home to kangaroos, echidnas, and over 100 species
  of birds. Walking and cycling trails wind through the gorge along the Plenty River.
