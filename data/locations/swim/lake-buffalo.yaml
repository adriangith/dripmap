description: >
  A large, north-facing irrigation storage near Myrtleford with oodles of fresh, clean water sourced from the
  surrounding national park. Lake Buffalo looks its best in late spring and early summer when it is usually close to
  full, with designated swimming areas on both sides of the lake.
