description: >
  A large waterfall pool with a high rock wall on three sides, larger than an Olympic swimming pool. Turpins Falls was
  home to the Turpins Falls Swimming Club back in the 1930s before municipal swimming pools became popular. A dramatic
  and historic swimming spot.
