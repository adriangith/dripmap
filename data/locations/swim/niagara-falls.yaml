region: North America
country: CA
description: Not to be confused with its North American namesake, Victoria's Niagara Falls is a charming waterfall on the
  Sabine River near Trentham in the Macedon Ranges. The falls drop several metres into a swimming hole surrounded by lush
  tree ferns and native forest. A short walking track from the picnic area leads to the base of the falls.
