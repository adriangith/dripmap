directions: 'From Toronto, take the QEW south toward Niagara. Follow signs to Niagara Falls. Main parking is at the Niagara
  Parks Welcome Centre on Niagara Parkway.

  '
tips:
- Short walk from the picnic area to the falls — suitable for families
- Best after rain when water flow is strongest
- The pool can be cold even in summer — quick dip territory
- Combine with a visit to nearby Trentham for cafes and the historic railway
- Look for platypus in the early morning or at dusk
