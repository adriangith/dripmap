directions: >
  From Melbourne, head west on the Western Freeway towards Bacchus Marsh. Turn off at the Lerderderg Gorge Road exit and
  follow signs to the gorge. Grahams Dam area has a car park and walking trails along the river.
tips:
  - Visit in spring or early summer when water levels are highest
  - The river can dry up in late summer — check conditions before visiting
  - Wear sturdy walking shoes for the rocky terrain
  - Bring sun protection as shade is limited near the water
