tips:
- Mackenzies Flat has electric BBQs, toilets, and picnic tables
- O'Briens Crossing has several walks for different fitness levels
- The East Walk and Cowan Track Loop is a challenging but rewarding day hike
- Camping available at Lerderderg Campground near O'Briens Crossing
- River levels drop in late summer — best swimming in spring/early summer
