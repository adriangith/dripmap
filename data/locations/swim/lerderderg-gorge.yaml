description: The Lerderderg River has carved a deep and picturesque gorge through this rugged state park, just an hour's drive
  from Melbourne near Bacchus Marsh and Ballarat. Despite its proximity to the city, many areas feel truly remote. Swim in
  the river at popular spots like Mackenzies Flat or O'Briens Crossing, then follow old water races and hike part of the Great
  Dividing Trail.
