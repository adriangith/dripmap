tips:
- Surprisingly warm for an alpine lake in summer — give it a try
- National park entry fees apply ($15.20/car in 2025)
- Walk the Lakeside Trail through twisted Snow Gum forests
- Wombats are commonly seen around the campground at dusk
- Combine with a drive to The Horn for spectacular views at 1,723m
