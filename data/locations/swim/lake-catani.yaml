description: >
  An alpine lake at approximately 1300 metres above sea level in Mount Buffalo National Park, featuring a shimmering
  golden granite floor, its own little beach, a jetty, and three swimming areas suitable for a dip in summer.
  Surprisingly warm given its high altitude.
