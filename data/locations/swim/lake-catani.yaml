description: A beautiful alpine lake at 1,300 metres elevation in Mount Buffalo National Park, constructed in 1910 and named
  after engineer Carlo Catani. The 15-hectare reservoir features a golden granite floor, its own sandy beach, a jetty, and
  three designated swimming areas. Camp among wombats on the shoreline and explore Snow Gum forests on the Lakeside Walk.
