description: A popular suburban lake in the foothills of the Dandenong Ranges, perfect for a quick escape from Melbourne.
  Lysterfield Lake has two sandy beaches near Beach Carpark suitable for walk-in swimming. The surrounding park is home to
  kangaroos and wallabies, 24km of mountain bike trails (including the 2006 Commonwealth Games venue), and a scenic 6km Lake
  Circuit Trail.
