description: A series of natural rock pools along Stony Creek in the Grampians (Gariwerd) National Park, accessible via a
  gentle walk from the Halls Gap township. The Venus Baths are formed by water flowing over smooth sandstone ledges into clear
  pools — a perfect refreshing dip on a warm day. The area is rich with Aboriginal rock art and native wildlife including
  kangaroos and emus.
