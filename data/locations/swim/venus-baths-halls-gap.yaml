tips:
- A gentle 30-minute walk from the Botanic Gardens car park in Halls Gap
- Pools are shallow — suitable for wading and cooling off rather than deep swimming
- Visit nearby Brambuk Aboriginal Cultural Centre to learn about Gariwerd's heritage
- Kangaroos are commonly seen on the walk — especially morning and evening
- Combine with other Grampians walks like the Pinnacle or Boroka Lookout
