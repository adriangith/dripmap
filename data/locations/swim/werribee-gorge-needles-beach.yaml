directions: 'From Bacchus Marsh, follow signs to Werribee Gorge State Park. Park at the Meikles Point car park and follow
  the circuit track to Needles Beach. The walk is strenuous with some scrambling required.

  '
tips:
- The Circuit Walk is challenging — wear sturdy boots and bring 3-4L of water per person
- Check for track closures after heavy rain — river sections may flood
- Arrive early in summer to secure parking at the gorge entrance
- Rock-hop carefully to reach the best swimming spots
- Ancient glacial deposits visible in the gorge walls — 400+ million years old
