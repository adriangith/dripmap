description: A dramatic swimming spot at the bottom of Werribee Gorge, a 200-metre deep gorge carved by the Werribee River
  over a million years ago. Needles Beach is accessed via the challenging Circuit Walk through the gorge, rewarding hikers
  with a secluded river swimming hole surrounded by ancient geological formations. Near Bacchus Marsh, just an hour west of
  Melbourne.
