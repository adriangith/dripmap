description: >
  Rippon Lea Estate is a heritage-listed Victorian mansion and gardens
  in Elsternwick, managed by the National Trust of Australia. Built in
  1868 for Sir Frederick Sargood, the Lombardic Romanesque mansion sits
  on expansive grounds featuring a man-made lake, heritage gardens,
  orchards, and a fernery. Listed on the Australian National Heritage
  List, the estate offers guided house tours, garden walks, and hosts
  seasonal events and exhibitions throughout the year.
