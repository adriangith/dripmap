directions: >
  Located at 192 Hotham Street, Elsternwick. Take the Sandringham train
  line to Rippon Lea station which is right next to the estate entrance.
  Street parking available on Hotham Street.
tips:
  - Allow 1.5-2 hours to see both the house and gardens
  - Guided house tours run at set times — check the website for schedule
  - National Trust members receive free entry
  - The gardens are beautiful in spring when the flowers are in bloom
