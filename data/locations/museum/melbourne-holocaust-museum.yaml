description: >
  The Melbourne Holocaust Museum in Elsternwick is dedicated to Holocaust
  education, research, and remembrance. Founded in 1984 by Holocaust
  survivors, the museum's core exhibition "Everybody Had a Name" is an
  immersive exploration of the Jewish experience of the Holocaust, from
  pre-war life through to how survivors rebuilt their lives in Melbourne.
  The museum also hosts rotating special exhibitions, survivor talks, film
  screenings, and panel discussions.
