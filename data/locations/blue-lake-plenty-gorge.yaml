directions: >
  Located in Plenty Gorge Park in Melbourne's north-east. Access via Yan Yean Road or Plenty Road, then follow trails into the gorge parklands. The lake is reached via walking tracks from several entry points.
tips:
  - Water quality varies seasonally — visit during cooler months for clearer water
  - Wear sturdy shoes for the walk in
  - No facilities at the lake — bring your own supplies
  - Check for algal bloom warnings before visiting
