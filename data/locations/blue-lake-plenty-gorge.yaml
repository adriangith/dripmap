description: >
  A former quarry in bush parklands in Melbourne's north-east. The lake sits within Plenty Gorge Park and offers swimming in a natural bush setting. Water quality can vary, with the lake sometimes turning green in summer due to algae, but conditions are generally better during the cooler months.
