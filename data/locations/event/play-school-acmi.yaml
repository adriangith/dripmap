description: >
  ACMI (Australian Centre for the Moving Image) at Federation Square hosts
  a beloved Play School exhibition where little ones can step inside the
  iconic Play School set. Kids can play with the rocket clock, look through
  the windows, dress up, and interact with hands-on activities inspired by
  the classic ABC show.
