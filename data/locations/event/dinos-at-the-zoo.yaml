directions: >
  K Road, Werribee South. About 30 minutes from Melbourne CBD via the
  Princes Freeway. Free parking on site. The zoo is also accessible via
  bus from Werribee station.
tips:
  - The safari bus tour is included in entry and shouldn't be missed
  - Allow a full day to see both dinosaurs and animals
  - Bring sunscreen and hats — much of the zoo is open and exposed
