description: >
  Werribee Open Range Zoo hosts Dinos at the Zoo, an immersive experience
  featuring life-sized animatronic dinosaurs scattered throughout the zoo
  grounds. Kids can explore the dinosaur trail alongside the zoo's African
  animals, join fossil-digging activities, and learn about prehistoric
  creatures through interactive displays.
