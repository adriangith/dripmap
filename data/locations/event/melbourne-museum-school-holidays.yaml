description: >
  Melbourne Museum in Carlton Gardens runs special programs during every school
  holiday period. Kids can explore the Pauline Gandel Children's Gallery, see
  dinosaur fossils in the Wild exhibition, walk through Bunjilaka Aboriginal
  Cultural Centre, and join holiday workshops and storytelling sessions.
