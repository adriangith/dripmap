description: >
  Ahoy Williamstown is a pirate-themed festival along the Williamstown
  foreshore during school holidays. The event features treasure hunts,
  pirate performances, face painting, craft activities, market stalls,
  and nautical-themed fun for the whole family along the beautiful
  waterfront.
