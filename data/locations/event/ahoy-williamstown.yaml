directions: >
  Williamstown foreshore, along Nelson Place and Commonwealth Reserve.
  Take the Williamstown train line to Williamstown station, then walk to
  the foreshore. Limited street parking available.
tips:
  - Come in pirate costume for extra fun
  - The foreshore playground is great for kids after the event
  - Arrive early for parking — it fills up fast
