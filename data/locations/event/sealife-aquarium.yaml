description: >
  SEA LIFE Melbourne Aquarium on the banks of the Yarra is home to thousands
  of aquatic animals across themed zones. Walk through the oceanarium tunnel
  surrounded by sharks and rays, explore the penguin playground, touch
  starfish in the rockpool, and discover jellyfish, seahorses, and
  crocodiles across multiple levels.
