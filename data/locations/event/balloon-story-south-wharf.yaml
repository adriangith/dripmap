description: >
  Balloon Story is a massive indoor balloon playground at South Wharf where
  kids can jump, slide, and play in rooms filled with thousands of colourful
  balloons. The immersive space features ball pits, balloon slides, photo
  opportunities, and themed rooms that change regularly. Perfect for rainy
  days or hot summer afternoons.
