description: >
  Scienceworks in Spotswood transforms during school holidays with hands-on
  workshops, live science shows, and interactive exhibits designed for curious
  kids. The permanent exhibitions include the Lightning Room high-voltage show,
  Sportsworks, and the Planetarium. Special holiday programs change each term.
