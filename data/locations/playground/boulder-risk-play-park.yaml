description: >
  There is almost nothing ordinary about Melbourne's coolest playground.
  At first glance it looks like builders forgot to finish their work —
  no even surfaces, no smooth handrails, and plenty of hazards to keep
  an eye on. But that's exactly the point. Boulder Park in Southbank is
  designed to let kids assess and manage risk through play.
