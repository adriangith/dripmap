description: >
  A fantastic nature play playground in Parkville where the blend of
  playground and nature is excellent. Ropes, wood and rocks replace the
  usual run-of-the-mill play equipment, encouraging kids to climb, balance
  and explore in a more natural setting. Set within the beautiful Royal
  Park with views of the city skyline.
