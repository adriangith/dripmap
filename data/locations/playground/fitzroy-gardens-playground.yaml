directions: >
  Fitzroy Gardens is bounded by Wellington Parade, Clarendon Street,
  Albert Street and Lansdowne Street. Walk from Parliament station
  (10 minutes) or Jolimont station (5 minutes). Tram routes 48/75
  run along Wellington Parade.
tips:
