description: >
  Trade the city's hustle for nature's hush at Fitzroy Gardens. This
  is the perfect place to immerse yourself in vibrant greenery right in
  the heart of Melbourne. Features a playground, beautiful gardens,
  walking trails, a cafe, conservatory, and Captain Cook's Cottage.
