description: >
  Splash in the stream, roll down a mini hill, play pandas in the bamboo
  forest or be a fairy among tree hollows and rocky mounds. The Ian Potter
  Children's Garden within the Royal Botanic Gardens is totally dedicated
  to children and full of things that will have families enjoying this place
  for hours.
