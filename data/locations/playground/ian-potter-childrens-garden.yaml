directions: >
  Enter the Royal Botanic Gardens via Gate F on Birdwood Avenue. The
  Children's Garden is signposted within the gardens. Tram routes
  3/5/6/16/64/67/72 stop nearby on St Kilda Road.
tips:
  - Opens at 10am Wednesday–Sunday (closed Mon–Tue)
  - Can get busy on weekends — arrive early
  - Bring a change of clothes for the water play
  - Combine with a picnic in the Botanic Gardens
