description: >
  A magical playground set among 150-year-old Moreton Bay fig trees in
  Carlton. The ancient trees have been incorporated into the play space
  design, giving it the feel of a fairy garden amongst a forest. One
  of Melbourne's most atmospheric playgrounds.
