directions: >
  From Heyfield, head north-east towards Glenmaggie. The lake is signposted from the main road. Multiple access points around the lake provide swimming opportunities.
tips:
  - Visit in spring when the lake is usually at its fullest
  - Lake can be drawn down significantly in summer
  - Sandy beaches among flooded gum trees create unique scenery
  - Check water levels before making the trip
