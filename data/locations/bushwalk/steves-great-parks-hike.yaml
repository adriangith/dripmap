slug: steves-great-parks-hike
name: Steve's Great Melbourne Parks Hike
type: bushwalk
coordinates:
  lat: -37.8305
  lng: 144.9734
region: Victoria, Australia
country: AU
description: >
  An 11.5km urban hike through Melbourne's finest parks, from the Shrine of
  Remembrance to Flemington Bridge station. Pass through the Royal Botanic
  Gardens, cross the lovely Morrell Bridge, walk through the MCG precinct,
  Fitzroy Gardens, Carlton Gardens and past the Royal Exhibition Building.
  Stop for coffee on Lygon Street before finishing through Princes Park and
  Royal Park.
