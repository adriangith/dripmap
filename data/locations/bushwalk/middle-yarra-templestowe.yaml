directions: >
  Start at Westerfolds Park car park in Templestowe (drive or bus 293).
  Follow the Main Yarra Trail east through bushland to Eltham Lower Park.
  Return by bus from Eltham station or arrange a car shuttle.
tips:
  - Early morning is best for kangaroo sightings
  - Trail is unsealed — proper walking shoes recommended
  - Feels like a real bush walk despite being suburban
  - Pack lunch — limited food options along the trail
