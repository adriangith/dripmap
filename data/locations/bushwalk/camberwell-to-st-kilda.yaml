directions: >
  Start at Camberwell station (Glen Waverley or Alamein line). Walk south
  through Hawthorn, cross the Yarra via Bridge Road, and follow the river
  trail west. Continue through Fawkner Park and down Fitzroy Street to
  St Kilda Pier. Return by tram (routes 3a/16/96) from Acland Street.
tips:
  - Time it for a sunset finish at St Kilda Pier
  - Plenty of food options at both ends
  - Mostly flat apart from the Hawthorn hills
  - Great afternoon walk starting around 2pm in summer
