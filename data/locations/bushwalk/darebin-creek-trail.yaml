slug: darebin-creek-trail
name: Darebin Creek Trail (Alphington to Bundoora)
type: bushwalk
coordinates:
  lat: -37.7785
  lng: 145.0314
region: Victoria, Australia
country: AU
description: >
  An 8.9km walk along Darebin Creek from Alphington to Bundoora Park.
  Follow the tree-lined creek trail through some of Melbourne's quietest
  green corridors, past wetlands and through established parklands. One
  of Melbourne's most underrated trails, especially peaceful on weekday
  mornings.
