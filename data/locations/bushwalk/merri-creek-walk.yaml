directions: >
  Start at CERES in Brunswick East (train to Moreland station or drive).
  Follow the Merri Creek Trail south through Northcote and Clifton Hill.
  The trail joins the Yarra at Dights Falls — continue south through
  Collingwood and Fitzroy to Parliament station.
tips:
  - CERES Organic Market Cafe is a great starting breakfast spot
  - Look for the painted murals near Rushall station
  - Trail is mostly flat and well-signed
  - Best on weekday mornings when the trail is quiet
