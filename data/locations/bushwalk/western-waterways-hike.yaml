directions: >
  Start at Aircraft station (Sunbury line). Walk south along the
  Maribyrnong River Trail through Brimbank Park and into Footscray.
  At the river mouth cross to the Westgate Park precinct and follow
  the coastal trail to Williamstown station. Return by train.
tips:
  - Long walk — bring lunch or plan to eat in Footscray
  - Start early to allow plenty of daylight
  - Less crowded than eastern trails
  - Williamstown has pubs and restaurants for a well-earned finish
