slug: western-waterways-hike
name: Western Waterways Hike (Aircraft to Williamstown)
type: bushwalk
coordinates:
  lat: -37.7366
  lng: 144.8394
region: Victoria, Australia
country: AU
description: >
  A long 22km hike along the Maribyrnong River from Aircraft station
  through Melbourne's western waterways to Williamstown. Follow the
  Maribyrnong River Trail past Brimbank Park and Footscray, then cross
  to the Yarra and continue along the waterfront to the historic port
  town of Williamstown. A full-day adventure showcasing Melbourne's
  underrated west.
