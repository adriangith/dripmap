directions: >
  Start at Williamstown station or drive to the waterfront. Walk south
  along the bay foreshore past Seaholme Beach and through Altona Coastal
  Park. Finish at Altona Pier. Return by train from Altona station
  (short walk from the pier).
tips:
  - Bring binoculars for birdwatching at Altona Coastal Park
  - Mostly flat and paved — great for a relaxed morning
  - Williamstown has excellent cafes for a pre-walk coffee
  - Beautiful sunset spot if you walk it in reverse
