directions: >
  Start at Middle Brighton train station. Walk west to the beach, then
  follow the Bay Trail north along the foreshore through Elwood, St Kilda,
  and South Melbourne to Station Pier in Port Melbourne. Return by tram
  (route 109) from Port Melbourne.
tips:
  - Bring swimmers for a dip at St Kilda or Elwood
  - Mostly flat and paved — suitable for all fitness levels
  - Great sunset walk if started in the late afternoon
  - Plenty of cafes and food options along the route
