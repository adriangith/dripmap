slug: brighton-to-port-melbourne
name: Bayside Beach Hike (Brighton to Port Melbourne)
type: bushwalk
coordinates:
  lat: -37.9092
  lng: 144.9867
region: Victoria, Australia
country: AU
description: >
  A 12.5km coastal walk from Middle Brighton station to Port Melbourne Pier.
  Stroll past the iconic Brighton Bathing Boxes, along Elwood Beach and
  St Kilda Beach, past the South Melbourne Life Saving Club, and finish at
  Station Pier where you can reward yourself with fish and chips in true
  Melbourne style.
