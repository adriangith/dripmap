slug: merri-creek-walk
name: Merri Creek Walk (Coburg to Parliament)
type: walk
coordinates:
  lat: -37.7398
  lng: 144.9787
region: Victoria, Australia
country: AU
description: >
  A 10km walk following Merri Creek from Coburg into the heart of
  Melbourne. Start at the CERES Community Environment Park for breakfast,
  then follow the creek trail through Northcote and Clifton Hill. The
  trail meets the Yarra and continues through the Collingwood and Fitzroy
  back-streets finishing at Parliament station. One of Melbourne's best
  creek-side urban trails.
photos:
  - url: https://upload.wikimedia.org/wikipedia/commons/thumb/d/d9/Preston_swing_bridge_for_Merri_Creek_Trail_%2845740749374%29.jpg/960px-Preston_swing_bridge_for_Merri_Creek_Trail_%2845740749374%29.jpg
    alt: Merri Creek trail through Melbourne's inner north
    credit: "Philip Mallis from Melbourne"
highlights:
  - Breakfast at CERES Community Environment Park
  - Leafy creek-side trail through inner north
  - Street art and laneways through Fitzroy
cost: free
duration: half-day
