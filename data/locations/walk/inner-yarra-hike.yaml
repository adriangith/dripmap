slug: inner-yarra-hike
name: Inner-Yarra Hike (Fairfield to Fed Square)
type: walk
coordinates:
  lat: -37.7788
  lng: 145.0178
region: Victoria, Australia
country: AU
description: >
  A 16km hike following the Yarra River from Fairfield Boathouse to
  Federation Square. Start with breakfast at the boathouse, then walk past
  Dights Falls where the Merri meets the Yarra. Continue through
  Collingwood Children's Farm and the Abbotsford Convent before following
  the river to Fed Square. Can be shortened to Fairfield to Abbotsford
  Convent for a gentler outing.
photos:
  - url: https://upload.wikimedia.org/wikipedia/commons/thumb/f/f7/Melbourne_Docklands_-_Yarras_Edge_-_marina_panorama.jpg/960px-Melbourne_Docklands_-_Yarras_Edge_-_marina_panorama.jpg
    alt: Yarra River trail between Fairfield and the city
    credit: "Diliff"
highlights:
  - Breakfast at Fairfield Boathouse
  - Dights Falls and Abbotsford Convent
  - Scenic riverside trail into the city
cost: free
duration: full-day
