directions: >
  Start at Fairfield Boathouse (bus routes from Clifton Hill or drive).
  Follow the Yarra Trail south through Studley Park, past Dights Falls
  and Collingwood Children's Farm. Continue along the river through
  Richmond and into the city, finishing at Federation Square.
tips:
  - Grab breakfast at Fairfield Boathouse before starting
  - Shorter option — stop at Abbotsford Convent (about 6km)
  - Trail is mostly flat along the river
  - Great solo walk with plenty of cafes along the way
