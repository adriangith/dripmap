slug: frankston-to-mt-eliza
name: Frankston to Mt Eliza Coastal Walk
type: walk
coordinates:
  lat: -38.1437
  lng: 145.1268
region: Victoria, Australia
country: AU
description: >
  A 14km coastal and bushland walk from Frankston to Mt Eliza along the
  Mornington Peninsula coastline. Start at Frankston Pier, walk south past
  Davey's Bay and Olivers Hill, through the Pines Flora and Fauna Reserve,
  and finish at the charming Mt Eliza village. Features a mix of beach,
  cliff-top paths, and tea-tree bushland.
