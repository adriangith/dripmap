directions: >
  Start at Frankston station (Frankston line). Walk south along the
  foreshore past Frankston Pier. Continue along the coastal path through
  Daveys Bay and Olivers Hill. Pass through The Pines Reserve and finish
  at Mt Eliza village. Return by bus (route 788 to Frankston station).
tips:
  - Great day trip from Melbourne — Frankston is 55min by train
  - Bring swimmers for the beaches along the way
  - Mt Eliza village has cafes for a well-earned lunch
  - Some steep sections around Olivers Hill — moderate fitness required
