  - url: https://upload.wikimedia.org/wikipedia/commons/thumb/c/cd/Royal_Botanic_Gardens_Melbourne_Guilfoyle%27s_Volcano_pano_2017.jpg/960px-Royal_Botanic_Gardens_Melbourne_Guilfoyle%27s_Volcano_pano_2017.jpg
    alt: Royal Botanic Gardens along Steve's Great Parks Hike in Melbourne
    credit: "Wpcpey"
