directions: >
  Start at the Shrine of Remembrance (tram routes 3/5/6/16/64/67/72 stop
  nearby). Walk north through the Royal Botanic Gardens, cross the Yarra via
  Morrell Bridge. Continue through Fitzroy Gardens and Carlton Gardens to
  Lygon Street, then through Princes Park and Royal Park to Flemington Bridge
  station.
tips:
  - Accessible by public transport at both ends
  - Pack water — limited refill points through the parks
  - Great for photography, especially early morning light
  - Lygon Street has excellent Italian cafes for a mid-walk break
