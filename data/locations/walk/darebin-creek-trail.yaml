slug: darebin-creek-trail
name: Darebin Creek Trail (Alphington to Bundoora)
type: walk
coordinates:
  lat: -37.7785
  lng: 145.0314
region: Victoria, Australia
country: AU
description: >
  An 8.9km walk along Darebin Creek from Alphington to Bundoora Park.
  Follow the tree-lined creek trail through some of Melbourne's quietest
  green corridors, past wetlands and through established parklands. One
  of Melbourne's most underrated trails, especially peaceful on weekday
  mornings.
photos:
  - url: https://upload.wikimedia.org/wikipedia/commons/thumb/5/56/Darebin_Creek_Trail_near_bridge_over_Darebin_Creek_at_Smith_Street%2C_Alphington.jpg/960px-Darebin_Creek_Trail_near_bridge_over_Darebin_Creek_at_Smith_Street%2C_Alphington.jpg
    alt: Tree-lined Darebin Creek trail
    credit: "Philip Mallis"
highlights:
  - Peaceful creek-side trail
  - Darebin Parklands wildlife
  - Bundoora Park heritage farm finish
cost: free
duration: half-day
ageSuitability:
  minAge: null
  ideal:
    - teens
    - adults
accessibility: easy
parking: street
facilities:
  - toilets
  - water
bestSeason:
  - spring
  - summer
  - fall
directions: >
  Start at Alphington station (Hurstbridge line). Walk east to Darebin
  Creek and follow the trail north through Ivanhoe and Reservoir. Finish
  at Bundoora Park. Return by bus from Bundoora.
tips:
  - Very quiet trail — great for mindful walking
  - Look for kingfishers near the wetland areas
  - Short enough for a morning or afternoon outing
  - Combine with a visit to Bundoora Park heritage farm
tags:
