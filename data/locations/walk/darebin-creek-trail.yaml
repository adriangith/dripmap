directions: >
  Start at Alphington station (Hurstbridge line). Walk east to Darebin
  Creek and follow the trail north through Ivanhoe and Reservoir. Finish
  at Bundoora Park. Return by bus from Bundoora.
tips:
  - Very quiet trail — great for mindful walking
  - Look for kingfishers near the wetland areas
  - Short enough for a morning or afternoon outing
  - Combine with a visit to Bundoora Park heritage farm
