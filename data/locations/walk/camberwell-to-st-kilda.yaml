slug: camberwell-to-st-kilda
name: Camberwell to St Kilda Walk
type: walk
coordinates:
  lat: -37.8274
  lng: 145.0583
region: Victoria, Australia
country: AU
description: >
  A 14km walk from Camberwell Junction to St Kilda Pier, tracing back
  streets, garden corridors and the Yarra through Melbourne's inner
  suburbs. Start at Camberwell Junction, walk through the leafy streets
  of Hawthorn and along the Yarra Trail, then through Fawkner Park and
  down to the St Kilda foreshore. End with sunset views from St Kilda
  Pier.
photos:
  - url: https://upload.wikimedia.org/wikipedia/commons/thumb/2/22/Melbourne_%28AU%29%2C_St_Kilda_Beach_--_2019_--_1590.jpg/960px-Melbourne_%28AU%29%2C_St_Kilda_Beach_--_2019_--_1590.jpg
    alt: St Kilda Pier at sunset
    credit: "Dietmar Rabich"
highlights:
  - Leafy Hawthorn back-streets
  - Yarra Trail riverside section
  - Sunset at St Kilda Pier
