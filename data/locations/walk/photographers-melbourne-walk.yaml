  - fall
  - winter
directions: >
  Start at Morrell Bridge (tram to Domain Interchange or walk from
  Flinders Street). Cross the bridge and walk west along the Yarra through
  Alexandra Gardens. Continue past the Arts Centre into the CBD via
  Flinders Street. Explore Hosier Lane and Degraves Street, finishing at
  Federation Square.
tips:
  - Best light for photography is early morning or golden hour
  - Hosier Lane street art changes frequently — always something new
  - Short walk — combine with a gallery visit or riverside lunch
  - Works well in any weather — Melbourne laneways are atmospheric in rain
