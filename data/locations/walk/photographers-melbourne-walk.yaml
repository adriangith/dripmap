slug: photographers-melbourne-walk
name: Photographer's Melbourne Walk
type: walk
coordinates:
  lat: -37.8234
  lng: 144.9763
region: Victoria, Australia
country: AU
description: >
  An 8km walk showcasing Melbourne's most photogenic spots, from Morrell
  Bridge to Federation Square. Start at the elegant Morrell Bridge over the
  Yarra, walk through the Alexandra Gardens, past the Arts Centre spire,
  through Flinders Street and the iconic laneways of the CBD, including
  Hosier Lane and Degraves Street. Finish at Federation Square. Perfect
  for capturing Melbourne's character.
photos:
  - url: https://upload.wikimedia.org/wikipedia/commons/thumb/1/1d/Melbourne_%28AU%29%2C_Melbourne_City_Centre_--_2019_--_1493-7.jpg/960px-Melbourne_%28AU%29%2C_Melbourne_City_Centre_--_2019_--_1493-7.jpg
    alt: Morrell Bridge over the Yarra on the Photographer's Melbourne Walk
    credit: "Dietmar Rabich"
highlights:
  - Morrell Bridge and Yarra riverside
  - Hosier Lane street art
  - Degraves Street and Melbourne laneways
cost: free
duration: half-day
