slug: middle-yarra-templestowe
name: Middle-Yarra Walk (Templestowe to Eltham)
type: walk
coordinates:
  lat: -37.7517
  lng: 145.1199
region: Victoria, Australia
country: AU
description: >
  A 13km walk along the Yarra from Westerfolds Park in Templestowe to
  Eltham. This section of the Yarra feels like a genuine bush walk —
  tall gums, kangaroos and cockatoos — yet it's only 25km from the CBD.
  Follow the Main Yarra Trail through Petty's Orchard and past
  waterholes to Eltham Lower Park.
