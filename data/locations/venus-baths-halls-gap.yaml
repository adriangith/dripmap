directions: >
  From Halls Gap, follow the well-marked walking track to Venus Baths. The walk is approximately 2 km return along Stony Creek through the bush.
tips:
  - Water can become stagnant in dry periods — visit after recent rain
  - The natural rock slide is fun but be careful on the slippery surface
  - Waist-deep pools — more bathing than swimming
  - Popular tourist spot — visit early morning for fewer crowds
